# ---------------------------------------------------------------------------
# name:     release
# triggers: version tags (v*)
#
# Builds release archives for macOS (x86_64 + aarch64), Linux, and Windows.
# Runs tests via cargo-nextest, then uploads compressed archives to the
# corresponding GitHub Release.
# ---------------------------------------------------------------------------

name: release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # -----------------------------------------------------------------------
  # Create the GitHub Release (required before any upload)
  # -----------------------------------------------------------------------
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            echo "Release already exists, skipping creation."
          else
            gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes ""
          fi

  # -----------------------------------------------------------------------
  # macOS — build for both x86_64 and aarch64
  # -----------------------------------------------------------------------
  macos:
    needs: create-release
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add build target
        run: rustup target add ${{ matrix.target }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARCHIVE="keymapper-${{ github.ref_name }}-${{ matrix.target }}.tar.xz"
          STAGING="dist/keymapper/${{ github.ref_name }}"
          mkdir -p "$STAGING"
          cp "target/${{ matrix.target }}/release/keymapper" "$STAGING/"
          cp "target/${{ matrix.target }}/release/keymapperd" "$STAGING/"
          cp LICENSE.TXT README.md "$STAGING/"
          tar -cJf "$ARCHIVE" "dist/keymapper/${{ github.ref_name }}"
          gh release upload "$GITHUB_REF_NAME" "$ARCHIVE" --clobber

  # -----------------------------------------------------------------------
  # Linux — x86_64 (native)
  # -----------------------------------------------------------------------
  linux-x86_64:
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libdbus-1-dev \
            libudev-dev \
            libxcb1-dev

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run

      - name: Build release
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Upload artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARCHIVE="keymapper-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.xz"
          STAGING="dist/keymapper/${{ github.ref_name }}"
          mkdir -p "$STAGING"
          cp "target/x86_64-unknown-linux-gnu/release/keymapper" "$STAGING/"
          cp "target/x86_64-unknown-linux-gnu/release/keymapperd" "$STAGING/"
          cp LICENSE.TXT README.md "$STAGING/"
          tar -cJf "$ARCHIVE" --sort=name "$STAGING"
          gh release upload "$GITHUB_REF_NAME" "$ARCHIVE" --clobber

  # -----------------------------------------------------------------------
  # Linux — aarch64 (native on ARM runner)
  # -----------------------------------------------------------------------
  linux-aarch64:
    needs: create-release
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libdbus-1-dev \
            libudev-dev \
            libxcb1-dev

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run

      - name: Build release
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Upload artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARCHIVE="keymapper-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.xz"
          STAGING="dist/keymapper/${{ github.ref_name }}"
          mkdir -p "$STAGING"
          cp "target/aarch64-unknown-linux-gnu/release/keymapper" "$STAGING/"
          cp "target/aarch64-unknown-linux-gnu/release/keymapperd" "$STAGING/"
          cp LICENSE.TXT README.md "$STAGING/"
          tar -cJf "$ARCHIVE" --sort=name "$STAGING"
          gh release upload "$GITHUB_REF_NAME" "$ARCHIVE" --clobber

  # -----------------------------------------------------------------------
  # Windows — x86_64
  # -----------------------------------------------------------------------
  windows:
    needs: create-release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Upload artifact
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $archive = "keymapper-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip"
          $files = @(
            "target/x86_64-pc-windows-msvc/release/keymapper.exe",
            "target/x86_64-pc-windows-msvc/release/keymapperd.exe",
            "LICENSE.TXT",
            "README.md"
          )
          7z a "$archive" $files
          gh release upload "${{ github.ref_name }}" "$archive" --clobber
